<!DOCTYPE html> <!-- Redirect old accessories URL to the unified shop page -->
<html lang="en"> <!-- Root element -->
<head> <!-- Document head for redirect -->
  <meta charset="UTF-8"> <!-- UTF-8 encoding -->
  <meta http-equiv="refresh" content="0; url=shop.html#accessories"> <!-- Instant redirect to accessories panel -->
  <link rel="canonical" href="shop.html#accessories"> <!-- Canonical shop accessories panel -->
  <title>Accessories | The Cigar Club Nashville</title> <!-- Fallback title during redirect -->
  <script>window.location.replace("shop.html#accessories");</script> <!-- JS redirect for browsers that ignore meta refresh -->
</head>
<body> <!-- Minimal body for no-JS fallback -->
  <p><a href="shop.html#accessories">Continue to accessories</a></p> <!-- Manual link if redirects are blocked -->
</body>
</html>
