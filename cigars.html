<!DOCTYPE html> <!-- Redirect old cigars URL to the unified shop page -->
<html lang="en"> <!-- Root element -->
<head> <!-- Document head for redirect -->

  <link rel="canonical" href="shop.html#cigars"> <!-- Canonical shop cigars panel -->

</body>
</html>
