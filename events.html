  <div class="site-top"> <!-- Sticky header + events banner stack -->
  <header class="site-header site-header--page"> <!-- Sticky header with expandable navigation -->
    <div class="header-bar"> <!-- Maroon navigation bar -->
      <button type="button" class="nav-expand-toggle" aria-expanded="false" aria-controls="header-nav-panel"> <!-- Expand/collapse site navigation -->

        <span class="nav-expand-label">Menu</span> <!-- Visible label for menu button -->
      </button>
      <button type="button" class="theme-toggle" aria-label="Switch to light mode"> <!-- Toggle light/dark mode -->
        <svg class="theme-toggle-icon theme-toggle-icon--light" viewBox="0 0 24 24" aria-hidden="true" focusable="false"> <!-- Sun icon shown in light mode -->
          <circle cx="12" cy="12" r="3.6" fill="none" stroke="currentColor" stroke-width="1.8"></circle> <!-- Centered sun core -->

          <path d="M13.2 3.4a8.6 8.6 0 1 0 7.4 13.1 6.7 6.7 0 1 1-7.4-13.1Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path> <!-- Centered crescent moon -->

          <li><a href="about-us.html"><img src="images/ICON-09.png" alt="" class="header-nav-icon" width="40" height="40"><span>About Us</span></a></li> <!-- Person icon for about us -->
          <li><a href="events.html" class="active"><img src="images/ICON-10.png" alt="" class="header-nav-icon" width="40" height="40"><span>Events</span></a></li> <!-- Calendar icon for events -->

        </ul>

    </div>
  </header>
  <a href="events.html" class="events-ticker" hidden> <!-- Scrolling next-event and task announcement -->
    <div class="events-ticker-viewport"> <!-- Clips scrolling text at bar edges -->
      <div class="events-ticker-track"> <!-- Animated row duplicated for seamless loop -->
        <span class="events-ticker-text"></span> <!-- Primary scrolling announcement copy -->
        <span class="events-ticker-text" aria-hidden="true"></span> <!-- Duplicate for infinite marquee loop -->
      </div>
    </div>
  </a>

  <main class="page-flow"> <!-- Main page content with editorial section flow -->
    <header class="events-page-masthead"> <!-- Page masthead matching the schedule panel language -->
      <img src="images/ICON-10.png" alt="" class="events-page-masthead__icon" width="48" height="48"> <!-- Calendar brand icon for Events -->
      <h1 class="events-page-title">Events</h1> <!-- All-caps page title -->
    </header>
    <section class="page-section events-upcoming-panel"> <!-- Native upcoming events list synced from Google -->
      <header class="events-upcoming-panel__header"> <!-- Compact header for the schedule panel -->
        <p class="events-upcoming-panel__eyebrow">Schedule</p> <!-- Small label above the section title -->
        <h2 class="events-upcoming-panel__title">Coming up next</h2> <!-- Section heading above event list -->
      </header>
      <div class="events-upcoming"> <!-- Populated by js/events-list.js -->
        <p class="events-upcoming__loading">Loading events…</p> <!-- Placeholder until events load -->
      </div>
    </section>

    <section class="page-section"> <!-- Full calendar embed section -->
      <div class="calendar-wrapper"> <!-- Responsive container for the embedded calendar -->
        <!-- Google Calendar embed: src is set by js/calendar-embed.js from js/calendar-config.js?v=2 -->
        <iframe
          class="calendar-embed"
          src="https://calendar.google.com/calendar/embed?height=700&amp;wkst=1&amp;bgcolor=%23fdfddc&amp;ctz=America%2FChicago&amp;mode=MONTH&amp;showTitle=0&amp;showNav=1&amp;showDate=1&amp;showPrint=0&amp;showTabs=1&amp;showCalendars=0&amp;src=9d624c02bc316b9c422aa30a1f3f580a11b1a85b2412df9d30bf675adfcdf607%40group.calendar.google.com"
          style="border: 0"
          width="800"
          height="700"
          frameborder="0"
          scrolling="no"
          title="The Cigar Club Nashville Events Calendar">
        </iframe>
      </div>
    </section>
  </main>

  <script src="js/calendar-embed.js"></script> <!-- Build calendar iframe URL from config -->
