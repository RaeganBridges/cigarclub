name: Sync calendar events

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/sync-calendar.js"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch calendar and write JSON
        run: node scripts/sync-calendar.js > data/calendar-events.json
      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calendar-events.json
          git diff --staged --quiet || git commit -m "Sync calendar events for ticker"
          git push
