<!DOCTYPE html> <!-- Tell the browser this is an HTML5 document -->
<html lang="en"> <!-- Root element; lang helps screen readers and search engines -->
<head> <!-- Document metadata section (not visible on page) -->
  <meta charset="UTF-8"> <!-- Use UTF-8 character encoding for special characters -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Make layout responsive on mobile -->
  <title>Cigar Club</title> <!-- Text shown in browser tab -->
  <link rel="stylesheet" href="css/styles.css"> <!-- Load shared site styles -->
</head>
<body class="home"> <!-- Home page body; black background applied via .home class -->

  <header class="site-header"> <!-- Full-width maroon header with overlapping logo tab -->
    <div class="header-bar"> <!-- Maroon navigation bar -->
      <nav class="nav-left" aria-label="Primary navigation"> <!-- Left group of nav pill links -->
        <a href="index.html" class="nav-pill nav-pill--sm" aria-label="Home"></a> <!-- Small tan nav pill: home -->
        <a href="#" class="nav-pill nav-pill--sm" aria-label="About"></a> <!-- Small tan nav pill: about (placeholder) -->
        <a href="events.html" class="nav-pill nav-pill--sm" aria-label="Events"></a> <!-- Small tan nav pill: events -->
      </nav>
      <a href="#" class="nav-pill nav-pill--lg" aria-label="Join"></a> <!-- Large tan CTA pill on the right -->
    </div>
    <a href="index.html" class="logo-tab"> <!-- Centered logo tab overlapping header and content -->
      <img src="images/LOGO_01.png" alt="Cigar Club" class="logo-img"> <!-- Full brand logo image -->
    </a>
  </header>

  <main class="home-cards"> <!-- Main area with three feature cards on black background -->
    <article class="feature-card"> <!-- First card column -->
      <figure class="card-image-frame"> <!-- Gray frame placeholder for a future image -->
        <!-- Uncomment and set src when image is ready: -->
        <!-- <img src="images/card-1.jpg" alt="Describe this image" class="card-image"> -->

      <div class="card-action"> <!-- Bottom notch area with icon button -->
        <a href="events.html" class="card-btn" aria-label="View events"></a> <!-- Tan square button linking to events -->
        <span class="card-line"></span> <!-- Decorative line beneath the button -->
      </div>
    </article>
    <article class="feature-card"> <!-- Second card column -->
      <figure class="card-image-frame"> <!-- Gray frame placeholder for a future image -->
        <!-- Uncomment and set src when image is ready: -->
        <!-- <img src="images/card-2.jpg" alt="Describe this image" class="card-image"> -->

      <div class="card-action"> <!-- Bottom notch area with icon button -->
        <a href="#" class="card-btn" aria-label="Learn more"></a> <!-- Tan square button (placeholder link) -->
        <span class="card-line"></span> <!-- Decorative line beneath the button -->
      </div>
    </article>
    <article class="feature-card"> <!-- Third card column -->
      <figure class="card-image-frame"> <!-- Gray frame placeholder for a future image -->
        <!-- Uncomment and set src when image is ready: -->
        <!-- <img src="images/card-3.jpg" alt="Describe this image" class="card-image"> -->
      </figure>
      <div class="card-action"> <!-- Bottom notch area with icon button -->
        <a href="#" class="card-btn" aria-label="Explore lounge"></a> <!-- Tan square button (placeholder link) -->
        <span class="card-line"></span> <!-- Decorative line beneath the button -->

    </article>

</html>
